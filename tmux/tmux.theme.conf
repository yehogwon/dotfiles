# Pane borders
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-border-style fg="#3a3a3a"
set -g pane-active-border-style fg="#A1C178"
set -g pane-border-format "#{?pane_active,#[fg=#1a1a1a#,bg=#A1C178#,bold] #{b:pane_current_path} ,#[fg=#666666] #{b:pane_current_path} }"

# Status bar
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-style "fg=#888888,bg=default"
set -g status-left-length 120
set -g status-right-length 100

# Left: session@host · cwd · git
set -g status-left " #[fg=#A1C178,bold]#S#[fg=#666666]@#[fg=#888888]#h#[fg=#444444] · #[fg=#cccccc]#{b:pane_current_path}#[fg=#444444] · #[fg=#888888]#(${DOTFILES_HOME}/tmux/scripts/git_status.sh) "

# Right: [prefix|copy] · [mouse] · [cwd] · [sync] · date · time
set -g status-right "#{?client_prefix,#[fg=#e5c07b#,bold]prefix#[default] #[fg=#444444]· ,}#{?pane_in_mode,#[fg=#e5c07b#,bold]copy#[default] #[fg=#444444]· ,}#{?mouse,#[fg=#888888]mouse #[fg=#444444]· ,}#(tmux show-window-options -v synchronize-panes 2>/dev/null | grep -q on && printf '#[fg=#e5c07b]sync #[fg=#444444]· ')#(tmux show-option -wqv @cwd_sync_panes 2>/dev/null | grep -q on && printf '#[fg=#e5c07b]cwd #[fg=#444444]· ')#[fg=#888888]%a %m/%d #[fg=#444444]· #[fg=#cccccc]%H:%M "

set -g window-status-separator "#[fg=#3a3a3a]  ·  "
set -g window-status-format "#[fg=#666666]#I #W"
set -g window-status-current-format "#[fg=#A1C178,bold]#I #W"
