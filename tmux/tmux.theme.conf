# Color palette
%hidden TMUX_COLOR_PANE_BORDER_INACTIVE="#3a3a3a"
%hidden TMUX_COLOR_PANE_BORDER_ACTIVE="#A1C178"
%hidden TMUX_COLOR_PANE_BORDER_ACTIVE_PATH="#1a1a1a"
%hidden TMUX_COLOR_PANE_BORDER_INACTIVE_PATH="#666666"
%hidden TMUX_COLOR_STATUS_TEXT="#888888"
%hidden TMUX_COLOR_STATUS_SESSION="#A1C178"
%hidden TMUX_COLOR_STATUS_SESSION_HOST_SEPARATOR="#666666"
%hidden TMUX_COLOR_STATUS_HOST="#888888"
%hidden TMUX_COLOR_STATUS_SECTION_SEPARATOR="#444444"
%hidden TMUX_COLOR_STATUS_PATH="#cccccc"
%hidden TMUX_COLOR_STATUS_GIT="#888888"
%hidden TMUX_COLOR_STATUS_PREFIX="#e5c07b"
%hidden TMUX_COLOR_STATUS_COPY="#e5c07b"
%hidden TMUX_COLOR_STATUS_MOUSE="#888888"
%hidden TMUX_COLOR_STATUS_SYNC="#e5c07b"
%hidden TMUX_COLOR_STATUS_CWD="#e5c07b"
%hidden TMUX_COLOR_STATUS_DATE="#888888"
%hidden TMUX_COLOR_STATUS_TIME="#cccccc"
%hidden TMUX_COLOR_WINDOW_STATUS_SEPARATOR="#3a3a3a"
%hidden TMUX_COLOR_WINDOW_STATUS_INACTIVE="#666666"
%hidden TMUX_COLOR_WINDOW_STATUS_ACTIVE="#A1C178"

# Pane borders
set -g pane-border-status top
set -g pane-border-lines heavy
set -g pane-border-style "fg=$TMUX_COLOR_PANE_BORDER_INACTIVE"
set -g pane-active-border-style "fg=$TMUX_COLOR_PANE_BORDER_ACTIVE"
set -g pane-border-format "\
#{?pane_active,\
#[fg=$TMUX_COLOR_PANE_BORDER_ACTIVE_PATH,bg=$TMUX_COLOR_PANE_BORDER_ACTIVE,bold] #{b:pane_current_path} ,\
#[fg=$TMUX_COLOR_PANE_BORDER_INACTIVE_PATH] #{b:pane_current_path} }"

# Status bar
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify absolute-centre
set -g status-style "fg=$TMUX_COLOR_STATUS_TEXT,bg=default"
set -g status-left-length 120
set -g status-right-length 100

# Left: session@host Â· cwd Â· git
set -g status-left "\
 #[fg=$TMUX_COLOR_STATUS_SESSION,bold]#S#[fg=$TMUX_COLOR_STATUS_SESSION_HOST_SEPARATOR]@#[fg=$TMUX_COLOR_STATUS_HOST]#h#[fg=$TMUX_COLOR_STATUS_SECTION_SEPARATOR] Â· \
#[fg=$TMUX_COLOR_STATUS_PATH]#{b:pane_current_path}#[fg=$TMUX_COLOR_STATUS_SECTION_SEPARATOR] Â· \
#[fg=$TMUX_COLOR_STATUS_GIT]#(${DOTFILES_HOME}/tmux/scripts/git_status.sh) "

# Right: [prefix|copy] Â· [mouse] Â· [cwd] Â· [sync] Â· date Â· time
set -g status-right "\
#{?client_prefix,#[fg=$TMUX_COLOR_STATUS_PREFIX,bold]prefix#[default] #[fg=$TMUX_COLOR_STATUS_SECTION_SEPARATOR]Â· ,}\
#{?pane_in_mode,#[fg=$TMUX_COLOR_STATUS_COPY,bold]copy#[default] #[fg=$TMUX_COLOR_STATUS_SECTION_SEPARATOR]Â· ,}\
#{?mouse,#[fg=$TMUX_COLOR_STATUS_MOUSE]mouse #[fg=$TMUX_COLOR_STATUS_SECTION_SEPARATOR]Â· ,}\
#(tmux show-window-options -v synchronize-panes 2>/dev/null | grep -q on && printf '#[fg=$TMUX_COLOR_STATUS_SYNC]sync #[fg=$TMUX_COLOR_STATUS_SECTION_SEPARATOR]Â· ')\
#(tmux show-option -wqv @cwd_sync_panes 2>/dev/null | grep -q on && printf '#[fg=$TMUX_COLOR_STATUS_CWD]cwd #[fg=$TMUX_COLOR_STATUS_SECTION_SEPARATOR]Â· ')\
#[fg=$TMUX_COLOR_STATUS_DATE]%a %m/%d #[fg=$TMUX_COLOR_STATUS_SECTION_SEPARATOR]Â· #[fg=$TMUX_COLOR_STATUS_TIME]%H:%M "

set -g window-status-separator "#[fg=$TMUX_COLOR_WINDOW_STATUS_SEPARATOR]  Â·  "
set -g window-status-format "#[fg=$TMUX_COLOR_WINDOW_STATUS_INACTIVE]#I #W"
set -g window-status-current-format "#[fg=$TMUX_COLOR_WINDOW_STATUS_ACTIVE,bold]#I #W"
